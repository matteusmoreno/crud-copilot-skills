 # MongoDB connection (override in CI or with env vars as needed)
 quarkus.mongodb.connection-string=mongodb://localhost:27017
 quarkus.mongodb.database=crud

 # OpenAPI (SmallRye) path
 quarkus.smallrye-openapi.path=/openapi

 # Server port (optional)
 # quarkus.http.port=8080

 # Notes:
 # - For tests/CI you can override quarkus.mongodb.connection-string to point to a Testcontainers started MongoDB
 # - Keep the defaults for local development with a running MongoDB on localhost

